name: write-pr-description
description: >
  Produce a complete PR description with Summary, Changes, Rationale, and Testing.

input:
  - name: diff
    type: string
    description: Unified diff text for the PR.
  - name: ticket_id
    type: string
    required: false
    description: Optional issue or ticket ID (e.g. GH-42).
  - name: testing_notes
    type: string
    required: false
    description: Optional notes on tests already run.

output:
  - name: pr_body
    type: string
    description: Markdown PR description with four structured sections.
